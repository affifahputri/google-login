<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk dengan Google</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library resmi Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Animasi sederhana untuk transisi */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">

    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border border-slate-100">
        
        <!-- Bagian Form Login -->
        <div id="login-container">
            <div class="mb-6 flex justify-center">
                <!-- Ikon Kunci SVG -->
                <div class="bg-blue-50 p-4 rounded-full text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold mb-2">Selamat Datang</h2>
            <p class="text-slate-500 mb-8 text-sm">Silakan masuk menggunakan akun Google kamu untuk melanjutkan.</p>

            <!-- Container untuk Tombol Google -->
            <div class="flex justify-center mb-4">
                <div id="googleButtonDiv"></div>
            </div>
            
            <p class="text-xs text-slate-400 mt-6">
                Catatan: Kamu perlu mengganti <code class="bg-slate-100 px-1 rounded">CLIENT_ID</code> di dalam kode dengan Client ID Google milikmu agar tombol bisa berfungsi penuh.
            </p>
            
            <!-- Tombol Demo (Hanya untuk preview jika belum punya Client ID) -->
            <button onclick="simulateLogin()" class="mt-4 text-xs text-blue-500 hover:text-blue-700 underline">
                Coba mode demo (Tanpa Client ID)
            </button>
        </div>

        <!-- Bagian Profil (Tampil setelah login berhasil) -->
        <div id="profile-container" class="hidden fade-in">
            <h2 class="text-xl font-bold mb-6 text-green-600">Login Berhasil!</h2>
            
            <img id="user-picture" src="" alt="Foto Profil" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-blue-50 object-cover shadow-sm">
            
            <h3 id="user-name" class="text-lg font-bold text-slate-800">Nama Pengguna</h3>
            <p id="user-email" class="text-slate-500 text-sm mb-6">email@domain.com</p>

            <button onclick="handleSignOut()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 px-4 rounded-xl transition-colors duration-200">
                Keluar
            </button>
        </div>

    </div>

    <script>
        // === KONFIGURASI GOOGLE SIGN-IN ===
        // Ganti string di bawah dengan Google Client ID milikmu dari Google Cloud Console
        const GOOGLE_CLIENT_ID = "258648454436-sdv5da3pj4uasq3j7d8hjant44gtui5g.apps.googleusercontent.com"; 

        window.onload = function () {
            // Inisialisasi Google Identity Services
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse
            });
            
            // Render tombol Google
            google.accounts.id.renderButton(
                document.getElementById("googleButtonDiv"),
                { 
                    theme: "outline", 
                    size: "large", 
                    width: 280,
                    shape: "pill",
                    logo_alignment: "center"
                } 
            );
        }

        // Fungsi ini dipanggil ketika login Google berhasil
        function handleCredentialResponse(response) {
            // Token JWT yang dikembalikan oleh Google
            const responsePayload = decodeJwtResponse(response.credential);

            // Tampilkan data profil
            showProfile(
                responsePayload.name, 
                responsePayload.email, 
                responsePayload.picture
            );
        }

        // Fungsi bantuan untuk men-decode token JWT dari Google
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // === FUNGSI UI & DEMO ===

        function showProfile(name, email, pictureUrl) {
            // Sembunyikan form login, tampilkan profil
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('profile-container').classList.remove('hidden');

            // Isi data profil ke HTML
            document.getElementById('user-name').innerText = name;
            document.getElementById('user-email').innerText = email;
            document.getElementById('user-picture').src = pictureUrl;
        }

        function handleSignOut() {
            // Sembunyikan profil, tampilkan kembali form login
            document.getElementById('profile-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
            
            // Hapus tampilan foto sebelumnya
            document.getElementById('user-picture').src = '';
        }

        // Fungsi ini hanya agar kamu bisa melihat tampilannya jika belum memasukkan Client ID
        function simulateLogin() {
            showProfile(
                "Pengguna Demo", 
                "demo@gmail.com", 
                "https://ui-avatars.com/api/?name=Pengguna+Demo&background=0D8ABC&color=fff&size=128"
            );
        }
    </script>
</body>
</html>
